name: multi-job-example

on: push 

jobs:
   first-job:
         runs-on: ubuntu-latest
         steps:
         - name: checkout
           uses: actions/checkout@v7

         - name: welcome message
           run: echo "welcome message"

         - name: ls
           run: ls -ltr
    
    second-job:
            runs-on: ubuntu-latest
            steps:
            - name: multi-commands
              run: |
                  echo "welcome"
                  ls -ltr

